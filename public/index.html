<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-chan | Tsundere Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>💢 Mini-chan</h1>
            <p>Berhenti malas-malasan, Baka!</p>
        </header>
        
        <div id="chat-box" class="chat-box">
            <div class="message bot">Hmph! Akhirnya kamu bangun juga. Ada yang mau ditanyain? Cepetan, aku sibuk! 😒</div>
        </div>

        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Mau tanya apaan, Baka?" required>
            <button type="submit">Kirim</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
